<script type="module">
import { db } from "./firebase.js";
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", () => {
  const STORAGE_KEY = "gcc_site_data_v1";
  const DEFAULT_PW = "gcc2026";

  async function loadDefault(){
    const res = await fetch("data.json", { cache: "no-store" });
    return res.json();
  }

  function styleInput(inp){
    inp.style.padding = "10px 12px";
    inp.style.borderRadius = "12px";
    inp.style.border = "1px solid rgba(255,255,255,.12)";
    inp.style.background = "rgba(0,0,0,.35)";
    inp.style.color = "var(--text)";
    inp.style.width = "100%";
  }

  function createEventRow(e, onRemove){
    const row = document.createElement("div");
    row.style.display = "grid";
    row.style.gridTemplateColumns = "1.2fr .7fr .9fr .55fr auto";
    row.style.gap = "8px";
    row.style.marginBottom = "10px";

    const title = document.createElement("input"); title.value = e.title || ""; title.placeholder = "Title";
    const date = document.createElement("input"); date.value = e.date || ""; date.placeholder = "YYYY-MM-DD";
    const loc = document.createElement("input"); loc.value = e.location || ""; loc.placeholder = "Location";
    const tag = document.createElement("input"); tag.value = e.tag || ""; tag.placeholder = "Tag";
    [title, date, loc, tag].forEach(styleInput);

    const del = document.createElement("button");
    del.textContent = "Remove";
    del.className = "btn ghost";
    del.style.padding = "10px 12px";
    del.style.cursor = "pointer";
    del.onclick = () => onRemove(row);

    row.append(title, date, loc, tag, del);
    row.getValue = () => ({
      title: title.value,
      date: date.value,
      location: loc.value,
      tag: tag.value
    });
    return row;
  }

  function createAlbumRow(a, onRemove){
    const row = document.createElement("div");
    row.className = "glass-card";
    row.style.padding = "12px";
    row.style.borderRadius = "18px";
    row.style.marginBottom = "10px";
    row.style.display = "grid";
    row.style.gap = "8px";

    const title = document.createElement("input"); title.value = a.title || ""; title.placeholder = "Album title";
    const desc = document.createElement("textarea"); desc.value = a.description || ""; desc.placeholder = "Short description"; desc.rows = 2;
    const link = document.createElement("input"); link.value = a.link || ""; link.placeholder = "Facebook album or post link";
    const cover = document.createElement("input"); cover.value = a.cover || ""; cover.placeholder = "Cover image URL (optional)";
    [title, desc, link, cover].forEach(styleInput);

    const del = document.createElement("button");
    del.textContent = "Remove Album";
    del.className = "btn ghost";
    del.style.cursor = "pointer";
    del.onclick = () => onRemove(row);

    row.append(title, desc, link, cover, del);
    row.getValue = () => ({
      title: title.value,
      description: desc.value,
      link: link.value,
      cover: cover.value
    });
    return row;
  }

  function mountRows(container, list, factory){
    container.innerHTML = "";
    const rows = [];
    list.forEach((item) => {
      const row = factory(item, (r) => {
        r.remove();
        rows.splice(rows.indexOf(r), 1);
      });
      rows.push(row);
      container.appendChild(row);
    });
    return rows;
  }

  let current = null;
  let ongoingRows = [];
  let upcomingRows = [];
  let albumRows = [];

  function fillEditor(data){
    current = data;
    document.getElementById("heroTitle").value = data.hero?.title || "";
    document.getElementById("heroSubtitle").value = data.hero?.subtitle || "";
    document.getElementById("cAddress").value = data.contact?.address || "";
    document.getElementById("cPhone").value = data.contact?.phone || "";
    document.getElementById("cEmail").value = data.contact?.email || "";
    document.getElementById("waLink").value = data.social?.whatsappChannel || "";
    document.getElementById("fbPage").value = data.social?.facebookPage || "";

    ongoingRows = mountRows(document.getElementById("ongoingEditor"), data.ongoing || [], createEventRow);
    upcomingRows = mountRows(document.getElementById("upcomingEditor"), data.upcoming || [], createEventRow);
    albumRows = mountRows(document.getElementById("albumEditor"), data.social?.facebookAlbums || [], createAlbumRow);
  }

  function unlock(){
    document.getElementById("editor").style.display = "block";
  }

  async function loadFromFirebase(){
    try {
      const snap = await getDoc(doc(db, "siteContent", "main"));
      if (snap.exists()) {
        fillEditor(snap.data());
        return;
      }
    } catch (e) {
      console.error("Firebase load failed", e);
    }

    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        fillEditor(JSON.parse(stored));
        return;
      } catch (e) {
        console.warn("localStorage parse failed", e);
      }
    }

    const def = await loadDefault();
    fillEditor(def);
  }

  const loginBtn = document.getElementById("loginBtn");
  if (loginBtn) {
    loginBtn.onclick = async () => {
      const pw = document.getElementById("pw").value.trim();
      const msg = document.getElementById("loginMsg");

      if (pw !== DEFAULT_PW) {
        msg.textContent = "Wrong password.";
        return;
      }

      msg.textContent = "Unlocked. You can edit content now.";
      unlock();
      await loadFromFirebase();
    };
  }

  const addOngoingBtn = document.getElementById("addOngoing");
  if (addOngoingBtn) {
    addOngoingBtn.onclick = () => {
      const row = createEventRow({}, (r) => {
        r.remove();
        ongoingRows.splice(ongoingRows.indexOf(r), 1);
      });
      ongoingRows.push(row);
      document.getElementById("ongoingEditor").appendChild(row);
    };
  }

  const addUpcomingBtn = document.getElementById("addUpcoming");
  if (addUpcomingBtn) {
    addUpcomingBtn.onclick = () => {
      const row = createEventRow({}, (r) => {
        r.remove();
        upcomingRows.splice(upcomingRows.indexOf(r), 1);
      });
      upcomingRows.push(row);
      document.getElementById("upcomingEditor").appendChild(row);
    };
  }

  const addAlbumBtn = document.getElementById("addAlbum");
  if (addAlbumBtn) {
    addAlbumBtn.onclick = () => {
      const row = createAlbumRow({}, (r) => {
        r.remove();
        albumRows.splice(albumRows.indexOf(r), 1);
      });
      albumRows.push(row);
      document.getElementById("albumEditor").appendChild(row);
    };
  }

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) {
    saveBtn.onclick = async () => {
      if (!current) current = {};

      current.hero = current.hero || {};
      current.hero.title = document.getElementById("heroTitle").value;
      current.hero.subtitle = document.getElementById("heroSubtitle").value;

      current.contact = current.contact || {};
      current.contact.address = document.getElementById("cAddress").value;
      current.contact.phone = document.getElementById("cPhone").value;
      current.contact.email = document.getElementById("cEmail").value;

      current.social = current.social || {};
      current.social.whatsappChannel = document.getElementById("waLink").value;
      current.social.facebookPage = document.getElementById("fbPage").value;
      current.social.facebookAlbums = albumRows
        .map((r) => r.getValue())
        .filter((a) => a.title.trim().length || a.link.trim().length);

      current.ongoing = ongoingRows
        .map((r) => r.getValue())
        .filter((e) => e.title.trim().length);

      current.upcoming = upcomingRows
        .map((r) => r.getValue())
        .filter((e) => e.title.trim().length);

      try {
        await setDoc(doc(db, "siteContent", "main"), current);
      } catch (e) {
        console.error("Firebase save failed", e);
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(current));
      alert("Website updated successfully!");
    };
  }

  const resetBtn = document.getElementById("resetBtn");
  if (resetBtn) {
    resetBtn.onclick = async () => {
      localStorage.removeItem(STORAGE_KEY);
      const def = await loadDefault();
      fillEditor(def);
      alert("Reset done.");
    };
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
