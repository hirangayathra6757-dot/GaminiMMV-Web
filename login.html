
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Admin Login • Gamini Central College</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div style="max-width:420px;margin:120px auto;text-align:center">
<h2>Admin Login</h2>

<input id="email" placeholder="Email" style="width:100%;padding:12px;margin:10px 0">
<input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin:10px 0">

<button id="loginBtn" style="padding:12px 20px">Login</button>

<p id="msg"></p>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from 
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

document.getElementById("loginBtn").onclick = async ()=>{

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);
window.location="admin.html";

}catch(e){

document.getElementById("msg").innerText="Login failed";

}

};
</script>

</body>
</html>
